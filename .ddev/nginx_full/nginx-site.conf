# Generated for the SymPress Demo DDEV nginx-fpm project.
# Mirrors the real project setup: WordPress core lives in /public/wp,
# but public URLs stay rooted at https://sympress-demo.dev/.
fastcgi_cache_path /var/cache/nginx/wordpress
    levels=1:2
    keys_zone=WORDPRESS:100m
    inactive=60m
    max_size=256m
    use_temp_path=off;

map $http_user_agent $sympress_cache_device {
    default desktop;
    ~*(Mobile|Android|Silk/|Kindle|BlackBerry|Opera\ Mini|Opera\ Mobi) mobile;
}

map $request_method $sympress_cache_skip_method {
    default 1;
    GET 0;
    HEAD 0;
}

map $query_string $sympress_cache_skip_query {
    default 1;
    "" 0;
}

map $request_uri $sympress_cache_skip_uri {
    default 0;
    ~*^/wp-admin/ 1;
    ~*^/wp/wp-admin/ 1;
    ~*^/wp-login\.php 1;
    ~*^/wp/wp-login\.php 1;
    ~*^/wp-cron\.php 1;
    ~*^/wp/wp-cron\.php 1;
    ~*^/xmlrpc\.php 1;
    ~*^/wp/xmlrpc\.php 1;
    ~*^/wp-json/ 1;
    ~*^/index\.php/wp-json/ 1;
    ~*^/_profiler/ 1;
    ~*^/_wdt/ 1;
    ~*preview=true 1;
}

map $http_cookie $sympress_cache_skip_cookie {
    default 0;
    ~*comment_author 1;
    ~*wordpress_[a-f0-9]+ 1;
    ~*wordpress_logged_in_ 1;
    ~*wordpress_sec_ 1;
    ~*wp-postpass_ 1;
    ~*preview_ 1;
    ~*woocommerce_cart_hash 1;
    ~*woocommerce_items_in_cart 1;
    ~*wp_woocommerce_session_ 1;
}

map $http_authorization $sympress_cache_skip_authorization {
    default 1;
    "" 0;
}

map "$sympress_cache_skip_method$sympress_cache_skip_query$sympress_cache_skip_uri$sympress_cache_skip_cookie$sympress_cache_skip_authorization" $sympress_cache_skip {
    default 1;
    "00000" 0;
}

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    root /var/www/html/public;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    index index.php index.htm index.html;

    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    # Canonicalize leaked physical WordPress core URLs back to public URLs.
    if ($request_uri ~ ^/wp/wp-login\.php(?:\?|$)) {
        return 302 https://$host/wp-admin/;
    }

    if ($request_uri ~ ^/wp/(?<public_path>wp-admin(?:/.*)?|wp-signup\.php|wp-activate\.php|wp-cron\.php|xmlrpc\.php)(?:\?|$)) {
        return 302 https://$host/$public_path$is_args$args;
    }

    location /wp/ {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ ^/wp-admin(/.*)?$ {
        rewrite ^/wp-admin(.*)$ /wp/wp-admin$1 last;
    }

    location ~ ^/wp-includes(/.*)?$ {
        rewrite ^/wp-includes(.*)$ /wp/wp-includes$1 last;
    }

    location ~ ^/(wp-login|wp-signup|wp-activate|wp-cron|xmlrpc)\.php$ {
        rewrite ^/(.*)$ /wp/$1 last;
    }

    include /var/www/html/dev-ops/nginx/static-assets-cache.conf;

    location / {
        absolute_redirect off;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        if (!-f $request_filename) {
            return 404;
        }

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_cache WORDPRESS;
        fastcgi_cache_key "$scheme|$request_method|$host|$request_uri";
        fastcgi_cache_bypass $sympress_cache_skip;
        fastcgi_no_cache $sympress_cache_skip $upstream_http_set_cookie $upstream_http_x_accel_expires;
        fastcgi_cache_methods GET HEAD;
        fastcgi_cache_valid 200 301 10m;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 10s;
        fastcgi_cache_lock_age 10s;
        fastcgi_cache_background_update on;
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;
        add_header X-Nginx-Cache $upstream_cache_status always;
        add_header X-SymPress-Cache-Skip $sympress_cache_skip always;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_intercept_errors off;
        fastcgi_read_timeout 10m;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS $fcgi_https;
        fastcgi_pass_header "X-Accel-Buffering";
        fastcgi_pass_header "X-Accel-Charset";
        fastcgi_pass_header "X-Accel-Expires";
        fastcgi_pass_header "X-Accel-Limit-Rate";
        fastcgi_pass_header "X-Accel-Redirect";
    }

    location ~* /\.(?!well-known\/) {
        deny all;
    }

    location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|psd|sh|sql|sw[op])|~)$ {
        deny all;
    }

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
