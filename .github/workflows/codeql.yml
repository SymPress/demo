name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '25 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    uses: sympress/workflows/.github/workflows/codeql.yml@v1
    with:
      languages: javascript-typescript
      build_mode: none
