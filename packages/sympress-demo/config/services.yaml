parameters:
    sympress_demo.plugin_file: '%kernel.project_dir%/public/wp-content/plugins/sympress-demo/sympress-demo.php'
    sympress_demo.view_path: '%kernel.project_dir%/packages/sympress-demo/resources/views'
    sympress_demo.version: '1.0.0'
    sympress_demo.render_events_enabled: false

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    SymPress\Demo\:
        resource: '../src/'
        exclude:
            - '../src/SymPressDemoBundle.php'
            - '../src/Application/Query/NoteListQuery.php'
            - '../src/Application/Seed/CreateDemoNotesRequest.php'
            - '../src/Application/Seed/CreateDemoNotesResult.php'
            - '../src/Application/Seed/DemoNoteDraft.php'
            - '../src/Application/Seed/DemoNoteFixture.php'
            - '../src/Application/Seed/DemoNoteFixtureSelection.php'
            - '../src/Entity/Note.php'
            - '../src/Entity/Topic.php'
            - '../src/Event/NoteRenderedEvent.php'
            - '../src/Profiler/'

    SymPress\Demo\Repository\NoteRepositoryInterface:
        alias: SymPress\Demo\Repository\WordPressNoteRepository

    SymPress\Demo\Application\Seed\DemoNoteWriterInterface:
        alias: SymPress\Demo\Infrastructure\WordPress\WordPressDemoNoteWriter

    SymPress\Demo\Application\Seed\RemoteQuoteProviderInterface:
        alias: SymPress\Demo\Infrastructure\WordPress\ZenQuotesQuoteProvider

    SymPress\Demo\Application\Telemetry\NoteRenderTelemetry:
        arguments:
            $enabled: '%sympress_demo.render_events_enabled%'

    SymPress\Demo\Support\TemplateRenderer:
        arguments:
            $viewPath: '%sympress_demo.view_path%'

    SymPress\Demo\Support\PluginAssetLocator:
        arguments:
            $pluginBase: '%sympress_demo.plugin_file%'
            $version: '%sympress_demo.version%'

    SymPress\Demo\Migration\CreateDemoEventsTableMigration:
        arguments:
            $database: '@wpdb'

    SymPress\Demo\Hook\DemoMigrations:
        tags:
            - { name: kernel.hook, hook: 'db_migration_register', method: register, accepted_args: 1 }
            - { name: kernel.hook, hook: 'db_migration_registered', method: migrate, priority: 20, accepted_args: 1 }

    SymPress\Demo\EventSubscriber\LogRenderedNoteSubscriber:
        tags:
            - { name: kernel.hook, hook: !php/const 'SymPress\EventDispatcher\Application\EventSystem::REGISTER_HOOK', method: register, accepted_args: 1 }

    SymPress\Demo\Infrastructure\WordPress\CustomPostTypeRegistrar:
        tags:
            - { name: kernel.hook, hook: 'init', method: register }

    SymPress\Demo\Infrastructure\WordPress\TaxonomyRegistrar:
        tags:
            - { name: kernel.hook, hook: 'init', method: register }

    SymPress\Demo\Infrastructure\WordPress\RestApiRegistrar:
        tags:
            - { name: kernel.hook, hook: 'rest_api_init', method: register }

    SymPress\Demo\Infrastructure\WordPress\BlockRegistrar:
        tags:
            - { name: kernel.hook, hook: 'init', method: register }

    SymPress\Demo\Infrastructure\WordPress\LocalizationRegistrar:
        arguments:
            $pluginBase: '%sympress_demo.plugin_file%'
        tags:
            - { name: kernel.hook, hook: 'plugins_loaded', method: load }

    SymPress\Demo\Admin\DemoDashboardPage:
        tags:
            - { name: kernel.hook, hook: 'admin_menu', method: register }

    SymPress\Demo\Asset\DemoAssetRegistrar:
        tags:
            - { name: kernel.hook, hook: !php/const 'SymPress\Assets\AssetManager::ACTION_SETUP', method: registerWithSymPressAssets }

    SymPress\Demo\Command\CreateDemoNotesCommand:
        tags:
            - { name: kernel.hook, hook: 'cli_init', method: register }
